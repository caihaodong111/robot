 #user  nobody;
  worker_processes  1;

  pid        logs/nginx.pid;

  events {
      worker_connections  1024;
  }

  http {
      include       mime.types;
      default_type  application/octet-stream;

      sendfile        on;
      keepalive_timeout  65;

      server {
          listen 5173;
          server_name 172.16.180.26;

          client_max_body_size 50m;

          root C:/Users/zhangyan4/Desktop/nginx-1.28.2/html/main;
          index index.html;

          location = / {
              return 302 /index.html;
          }

          location = /index.html {
          }

          location = /favicon.ico {
              try_files /vite.svg =404;
              access_log off;
              log_not_found off;
          }

          location /assets/ {
              try_files $uri =404;
          }

          location / {
              error_page 404 = /index.html;
              try_files $uri $uri/ =404;
          }

          location /devops/ {
              alias C:/Users/zhangyan4/Desktop/nginx-1.28.2/html/devops/;
              try_files $uri $uri/ /devops/index.html;
          }

          location /api/ {
              proxy_pass http://127.0.0.1:8001;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Forwarded-Host $host;
          }

          location /admin/ {
              proxy_pass http://127.0.0.1:8001;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Forwarded-Host $host;
          }

          location /ws/ {
              proxy_pass http://127.0.0.1:8001;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Forwarded-Host $host;
          }

          location /bi/ {
              proxy_pass http://127.0.0.1:5008;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Forwarded-Host $host;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }

          location ~ ^/static/js/bokeh.*\.js$ {
              proxy_pass http://127.0.0.1:5008;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Forwarded-Host $host;
          }

          location /static/ {
              alias C:/robotUI/backend57/staticfiles/;
              access_log off;
              expires 7d;
          }

          location /media/ {
              alias C:/robotUI/backend57/media/;
              access_log off;
              expires 7d;
          }
      }
  }
