server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # 主前端产物目录
    root C:/RobotUI/sg5.7/frontend/dist;
    index index.html;

    # 主前端
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 第二前端，建议把其打包产物部署到独立目录，并将 Vite base 配成 /devops/
    location /devops/ {
        alias C:/RobotUI/frontend-vue2/dist/;
        try_files $uri $uri/ /devops/index.html;
    }

    # Django API
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Django static/media，可按你的实际路径调整
    location /static/ {
        alias C:/RobotUI/sg5.7/backend/static/;
        access_log off;
        expires 7d;
    }

    location /media/ {
        alias C:/RobotUI/sg5.7/backend/media/;
        access_log off;
        expires 7d;
    }

    # Django Channels / WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Bokeh 独立服务。若实际访问路径不同，请按后端页面里的请求路径再细化。
    location /bi/ {
        proxy_pass http://127.0.0.1:5008/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
